name: Docker production CI

on:
  push:
    branches:
      - main

jobs:

  build-and-push:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: action/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backen Image
        run: docker build -t binayadevops/kutu-backend:v1 ./backend

      - name : Push the backend Images
        run: docker push binayadevops/kutu-backend:v1

      - name: Build Frontend Image
        run: docker build -t binayadevops/kutu-frontend:v1 ./frontend

      - name : Push the Frontend Images
        run: docker push binayadevops/kutu-frontend:v1




        
