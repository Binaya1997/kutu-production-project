name: Docker production CI

on:
  push:
    branches:
      - main

jobs:

  backend:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backen Image
        run: docker build -t binayadevops/kutu-backend:v2 ./backend

      - name : Push the backend Images
        run: docker push binayadevops/kutu-backend:v2
   
  frontend:
    
    needs: backend

    runs-on: ubuntu-latest

    steps:

      - name: checkout code
        uses: action/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}  

      - name: Build Frontend Image
        run: docker build -t binayadevops/kutu-frontend:v2 ./frontend

      - name : Push the Frontend Images
        run: docker push binayadevops/kutu-frontend:v2

